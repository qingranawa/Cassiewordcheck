name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build & Publish to dist
        run: dotnet publish CassieWordCheck.csproj -c Release -r win-x64 -o dist --verbosity quiet

      - name: Clean debug symbols
        run: Remove-Item "dist/*.pdb" -ErrorAction SilentlyContinue

      - name: Install Inno Setup 6
        run: |
          iwr -useb "https://jrsoftware.org/download.php/is.exe" -OutFile "$env:TEMP\innosetup.exe"
          Start-Process -Wait "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=`"$env:ProgramFiles\Inno Setup 6`""

      - name: Compile Setup
        shell: cmd
        run: |
          set TAG=%GITHUB_REF_NAME%
          set VER=%TAG:v=%
          "C:\Program Files\Inno Setup 6\ISCC.exe" setup.iss /dMyAppVersion=%VER%

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: "CASSIE-CWC-Tool-Setup-*.exe"
